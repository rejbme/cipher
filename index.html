<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher | Secure Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            --accent: #378ADD;
            --accent-soft: #378add1a;
            --bg-main: #f4f7f9;
            --bg-card: #ffffff;
            --bg-sidebar: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #0f172a;
                --bg-card: #1e293b;
                --bg-sidebar: #131c2f;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --border: #334155;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, border-color 0.3s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #app { width: 100%; max-width: 1100px; height: 90vh; background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; display: flex; position: relative; }

        /* --- AUTH SCREEN --- */
        .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, var(--accent-soft), transparent); }
        .auth-card { background: var(--bg-card); padding: 40px; border-radius: var(--radius-lg); border: 1px solid var(--border); width: 100%; max-width: 420px; box-shadow: var(--shadow); text-align: center; }
        
        .logo-icon { width: 64px; height: 64px; background: var(--accent); color: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 20px; }
        
        input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-main); color: var(--text-main); font-size: 14px; margin-bottom: 12px; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

        .btn-primary { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-google { width: 100%; padding: 12px; background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); border-radius: var(--radius-md); font-weight: 500; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-google:hover { background: var(--bg-main); }
        .btn-google img { width: 18px; }

        .divider { display: flex; align-items: center; margin: 20px 0; color: var(--text-muted); font-size: 12px; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

        /* --- MESSENGER UI --- */
        .sidebar { width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-card); }
        .item { padding: 12px; margin: 4px 8px; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .item.active { background: var(--accent); color: white; }
        
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* --- UTILS --- */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="auth-container">
        <div class="auth-card">
            <div class="logo-icon"><i class="ti ti-brand-messenger"></i></div>
            <h2 id="auth-title">Welcome back</h2>
            <p id="auth-subtext" style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">Enter your details to access your chats</p>
            
            <input type="email" id="email-input" placeholder="Email address">
            <input type="password" id="pass-input" placeholder="Password">
            
            <button class="btn-primary" onclick="handleAuth()">Sign In</button>
            
            <div class="divider">OR</div>
            
            <button class="btn-google" onclick="googleSignIn()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Continue with Google
            </button>
            
            <p style="margin-top: 20px; font-size: 13px;">
                <span id="toggle-text">Don't have an account?</span> 
                <a href="#" onclick="toggleAuthMode()" style="color: var(--accent); text-decoration: none; font-weight: 600;">Click here</a>
            </p>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-screen" class="hidden" style="width: 100%; display: flex;">
        <div class="sidebar">
            <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div id="user-avatar" class="avatar" style="width: 32px; height: 32px; font-size: 12px;"></div>
                    <span id="user-display-name" style="font-weight: 600; font-size: 14px;"></span>
                </div>
                <button onclick="signOut()" style="background: none; border: none; color: var(--text-muted); cursor: pointer;"><i class="ti ti-logout"></i></button>
            </div>
            <div style="flex: 1; overflow-y: auto; padding-top: 10px;">
                <div id="chat-list"></div>
            </div>
        </div>
        
        <div class="chat-panel">
            <div id="no-chat" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted);">
                <i class="ti ti-message-2" style="font-size: 50px; opacity: 0.2;"></i>
                <p>Select a conversation</p>
            </div>
        </div>
    </div>
</div>

<script>
    let isSignUp = false;
    let currentUser = null;

    function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById('auth-title').textContent = isSignUp ? "Create Account" : "Welcome back";
        document.getElementById('auth-subtext').textContent = isSignUp ? "Join Cipher today" : "Enter your details to access your chats";
        document.getElementById('toggle-text').textContent = isSignUp ? "Already have an account?" : "Don't have an account?";
    }

    // Modern Login Logic
    function handleAuth() {
        const email = document.getElementById('email-input').value;
        if (!email.includes('@')) return alert("Enter a valid email");
        
        // Mocking successful login
        currentUser = {
            name: email.split('@')[0],
            email: email,
            photo: null
        };
        completeLogin();
    }

    function googleSignIn() {
        // In a real app, you'd call firebase.auth().signInWithPopup(provider)
        alert("Redirecting to Google...");
        setTimeout(() => {
            currentUser = {
                name: "Google User",
                email: "user@gmail.com",
                photo: "G"
            };
            completeLogin();
        }, 1000);
    }

    function completeLogin() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        
        document.getElementById('user-display-name').textContent = currentUser.name;
        const av = document.getElementById('user-avatar');
        av.textContent = currentUser.photo || currentUser.name[0].toUpperCase();
        
        // Initialize dummy data
        renderDummyChats();
    }

    function signOut() {
        currentUser = null;
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
    }

    function renderDummyChats() {
        const list = document.getElementById('chat-list');
        const names = ["Alex Rivera", "Dev Team 🚀", "Satoshi", "Work Group"];
        list.innerHTML = names.map(n => `
            <div class="item">
                <div class="avatar" style="width: 36px; height: 36px; background: #e2e8f0; color: #64748b; font-size: 13px;">${n[0]}</div>
                <div style="flex: 1; font-size: 14px; font-weight: 500;">${n}</div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
