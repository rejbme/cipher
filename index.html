<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher | Live Secure Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            --accent: #378ADD; --accent-soft: #378add1a; --bg-main: #f4f7f9;
            --bg-card: #ffffff; --text-main: #1e293b; --border: #e2e8f0; --radius: 12px;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; --border: #334155; }
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        #app { width: 95%; max-width: 1000px; height: 85vh; background: var(--bg-card); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .auth-screen { position: fixed; inset: 0; background: var(--bg-main); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--bg-card); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid var(--border); width: 350px; }
        .msg-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 12px; border-radius: var(--radius); font-size: 14px; }
        .mine { align-self: flex-end; background: var(--accent); color: white; }
        .theirs { align-self: flex-start; background: var(--bg-main); border: 1px solid var(--border); }
        .input-bar { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); outline: none; }
        button { padding: 10px 20px; border-radius: var(--radius); border: none; cursor: pointer; font-weight: 600; background: var(--accent); color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-ui" class="auth-screen">
    <div class="auth-box">
        <h2>Cipher</h2>
        <p style="opacity: 0.6; font-size: 14px; margin-bottom: 20px;">Secure Messaging</p>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="window.handleEmailAuth()" style="width: 100%;">Sign In / Sign Up</button>
        <div style="margin: 15px 0; font-size: 12px; opacity: 0.5;">OR</div>
        <button onclick="window.handleGoogleAuth()" style="width: 100%; background: white; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="16"> Google
        </button>
    </div>
</div>

<div id="app">
    <div style="padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: bold;"># global-chat</span>
        <button onclick="window.logout()" style="background: transparent; color: var(--text-main); font-size: 12px;">Logout</button>
    </div>
    <div class="msg-area" id="msgs"></div>
    <div class="input-bar">
        <input type="text" id="m-input" placeholder="Say something...">
        <button onclick="window.send()">Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    // YOUR PERSONAL CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDjN67Xj4hZBh1CAm5Qf2adLfre9MkWCzM",
        authDomain: "webapp-4cb4c.firebaseapp.com",
        projectId: "webapp-4cb4c",
        storageBucket: "webapp-4cb4c.firebasestorage.app",
        messagingSenderId: "446601855015",
        appId: "1:446601855015:web:6145261487d7349f774e02",
        measurementId: "G-8QPS4H7EXY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    let user = null;

    // AUTH FUNCTIONS
    window.handleEmailAuth = async () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try { await signInWithEmailAndPassword(auth, e, p); } 
        catch { await createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message)); }
    };
    window.handleGoogleAuth = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, u => {
        if (u) { user = u; document.getElementById('auth-ui').classList.add('hidden'); loadMsgs(); }
        else { document.getElementById('auth-ui').classList.remove('hidden'); }
    });

    // CHAT FUNCTIONS
    window.send = async () => {
        const i = document.getElementById('m-input');
        if (!i.value.trim()) return;
        await addDoc(collection(db, "global"), {
            text: i.value,
            uid: user.uid,
            name: user.displayName || user.email.split('@')[0],
            time: serverTimestamp()
        });
        i.value = "";
    };

    function loadMsgs() {
        onSnapshot(query(collection(db, "global"), orderBy("time", "asc")), snap => {
            const box = document.getElementById('msgs');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = `msg ${d.uid === user.uid ? 'mine' : 'theirs'}`;
                div.innerHTML = `<div style="font-size: 10px; opacity: 0.6;">${d.name}</div>${d.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
